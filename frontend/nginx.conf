server {
    listen 80;
    server_name ammardevops.duckdns.org;
    return 301 https://$host$request_uri;
}

server {
    listen 80;
    server_name jenkins-ammar.duckdns.org;
    return 301 https://$host$request_uri;
}

server {
    listen 80;
    server_name chatbot-jenkins.duckdns.org;
    return 301 https://$host$request_uri;
}

# ==========================
# Ecommerce
# ==========================

server {
    listen 443 ssl;
    http2 on;

    server_name ammardevops.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/ammardevops.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ammardevops.duckdns.org/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    location /api/ {
        proxy_pass http://backend:5000/api/;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ==========================
# Jenkins
# ==========================

server {
    listen 443 ssl;
    http2 on;

    server_name jenkins-ammar.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/ammardevops.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ammardevops.duckdns.org/privkey.pem;

    client_max_body_size 100m;

    location / {

        proxy_pass http://jenkins:8080;

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_redirect off;

        proxy_read_timeout 90;
    }
}

