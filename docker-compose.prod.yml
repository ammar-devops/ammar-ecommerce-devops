services:
  backend:
    image: ghcr.io/ammar-devops/ecommerce-backend:latest
    container_name: ecommerce-backend

    ports:
      - "5000:5000"

    env_file:
      - ./backend/.env.production

    depends_on:
      - postgres

    restart: unless-stopped

    healthcheck:
      test:
        ["CMD", "wget", "--spider", "-q", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    image: ghcr.io/ammar-devops/ecommerce-frontend:latest
    container_name: ecommerce-frontend

    ports:
      - "80:80"

    depends_on:
      - backend

    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: ecommerce-postgres

    environment:
      POSTGRES_USER: ammar
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ecommerce

    volumes:
      - postgres-data:/var/lib/postgresql/data

    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ammar -d ecommerce"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
